<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expo Go QR</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-content: center;
        gap: 1rem;
        font-family: system-ui, sans-serif;
        background: #f3f4f6;
        color: #111827;
        text-align: center;
      }
      img {
        width: min(320px, 80vw);
        height: auto;
        background: #fff;
        padding: 1rem;
        border-radius: 12px;
      }
      code {
        font-size: 1rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>Scan with Expo Go</h1>
    <img
      alt="Expo Go QR code"
      src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=exp%3A%2F%2F192.168.29.249%3A8081"
    />
    <p><code>exp://192.168.29.249:8081</code></p>
    <p>Phone must be on the same Wi‑Fi as this computer.</p>
  </body>
</html>
